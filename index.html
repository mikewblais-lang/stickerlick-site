<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticker Lick</title>
  <meta name="description" content="Custom sticker design company focused on hard hat stickers, name stickers, car decals, bumper stickers, labels, and custom vinyl." />
  <style>
    :root {
      --bg: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --line: #e2e8f0;
      --soft: #f8fafc;
      --green: #10b981;
      --green-dark: #059669;
      --dark: #020617;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 0;
    }

    .brand-title { font-size: 1.6rem; font-weight: 900; }
    .brand-sub { font-size: 0.72rem; color: #64748b; text-transform: uppercase; }

    .nav-links { display: flex; gap: 24px; color: var(--muted); }

    .btn {
      padding: 14px 22px;
      border-radius: 18px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .btn-primary { background: var(--green); color: white; }
    .btn-dark { background: var(--dark); color: white; }
    .btn-outline { border-color: var(--line); }

    .hero { padding: 64px 0 44px; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 36px;
    }

    .mini-cards {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 14px;
    }

    .mini-card, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 18px;
    }

    .cards-3 {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 18px;
    }

    /* 🔥 FIXED IMAGE STYLING */
    .portfolio-box {
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      background: #f8fafc;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .portfolio-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    footer {
      border-top: 1px solid var(--line);
      padding: 26px;
    }

    @media (max-width: 700px) {
      .cards-3 { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
    }

  </style>
</head>

<body>

<header class="topbar">
  <div class="container nav">
    <div>
      <div class="brand-title">Sticker Lick</div>
      <div class="brand-sub">Custom Sticker Design</div>
    </div>
    <a href="#upload" class="btn btn-dark">Start</a>
  </div>
</header>

<main>

<section class="hero">
  <div class="container grid-2">
    <div>
      <h1>Upload your idea</h1>
      <p>We build the design and send the proof.</p>
    </div>
  </div>
</section>

<section id="portfolio" class="block soft">
  <div class="container">

    <div class="cards-3">

      <div class="card">
        <div class="portfolio-box">
          <img src="images/funny-new.png" alt="Funny Sticker">
        </div>
        <h3>Funny Stickers</h3>
      </div>

      <div class="card">
        <div class="portfolio-box">
          <img src="images/hardhat.png" alt="Hard Hat Sticker">
        </div>
        <h3>Hard Hat</h3>
      </div>

      <div class="card">
        <div class="portfolio-box">
          <img src="images/kids.png" alt="Kids Sticker">
        </div>
        <h3>Kids</h3>
      </div>

      <div class="card">
        <div class="portfolio-box">
          <img src="images/logo.png" alt="Logo Sticker">
        </div>
        <h3>Branding</h3>
      </div>

    </div>

  </div>
</section>

</main>

<footer>
  <div class="container">
    Sticker Lick ©
  </div>
</footer>

</body>
</html>
